name: Deploy Slides to Cloudflare Pages

on:
  push:
    branches: ["main"]
    paths:
      - "slides/**"
      - ".github/workflows/deploy-slides.yml"
  workflow_dispatch:

permissions:
  contents: read

# Allow only one concurrent deployment
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Collect slides into _site
        run: |
          mkdir -p _site
          cp -r slides/* _site/

      - name: Show site contents
        run: |
          echo "Site contents:"
          find _site -type f | head -50

      - name: Create Pages project if needed
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages project create spin-stabilization --production-branch=main
        continue-on-error: true

      - name: Deploy to Cloudflare Pages
        id: deploy
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy _site --project-name=spin-stabilization --commit-dirty=true

      - name: Print deployment URL
        run: |
          echo "Production: https://spin-stabilization.pages.dev"
          echo "Preview: ${{ steps.deploy.outputs.deployment-url }}"
