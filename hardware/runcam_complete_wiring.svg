<?xml version="1.0" encoding="UTF-8"?>
<svg viewBox="0 0 950 580" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect x="0" y="0" width="950" height="580" fill="#f8fafc"/>

  <!-- Title -->
  <text x="475" y="25" text-anchor="middle" font-size="18" font-weight="bold" fill="#1f2937" font-family="Arial, sans-serif">RunCam Split 4 — Complete Wiring (Low-Side MOSFET Switch)</text>
  <text x="475" y="45" text-anchor="middle" font-size="12" fill="#22c55e" font-family="Arial, sans-serif">Modified DollaTek WiFi Switch with Relay Removed</text>

  <!-- Battery -->
  <g transform="translate(30, 120)">
    <rect x="0" y="0" width="90" height="130" rx="8" fill="#fef3c7" stroke="#f59e0b" stroke-width="2"/>
    <text x="45" y="22" text-anchor="middle" font-size="11" font-weight="bold" fill="#92400e" font-family="Arial, sans-serif">2S LiPo</text>
    <text x="45" y="38" text-anchor="middle" font-size="10" fill="#92400e" font-family="Arial, sans-serif">7.4V</text>
    <text x="45" y="52" text-anchor="middle" font-size="9" fill="#92400e" font-family="Arial, sans-serif">500-1000mAh</text>
    <rect x="20" y="65" width="50" height="18" fill="#ef4444" rx="2"/>
    <text x="45" y="78" text-anchor="middle" font-size="9" fill="white" font-weight="bold" font-family="Arial, sans-serif">+</text>
    <rect x="20" y="92" width="50" height="18" fill="#1f2937" rx="2"/>
    <text x="45" y="105" text-anchor="middle" font-size="9" fill="white" font-weight="bold" font-family="Arial, sans-serif">-</text>
    <circle cx="90" cy="74" r="4" fill="#ef4444"/>
    <circle cx="90" cy="101" r="4" fill="#1f2937"/>
  </g>

  <!-- Buck Converter -->
  <g transform="translate(30, 300)">
    <rect x="0" y="0" width="90" height="70" rx="6" fill="#dbeafe" stroke="#3b82f6" stroke-width="2"/>
    <text x="45" y="18" text-anchor="middle" font-size="10" font-weight="bold" fill="#1e40af" font-family="Arial, sans-serif">Buck Conv.</text>
    <text x="45" y="32" text-anchor="middle" font-size="9" fill="#1e40af" font-family="Arial, sans-serif">7.4V to 5V</text>
    <text x="8" y="50" font-size="8" fill="#1e40af" font-family="Arial, sans-serif">IN</text>
    <circle cx="0" cy="47" r="3" fill="#ef4444"/>
    <circle cx="0" cy="58" r="3" fill="#1f2937"/>
    <text x="68" y="50" font-size="8" fill="#1e40af" font-family="Arial, sans-serif">OUT</text>
    <circle cx="90" cy="47" r="3" fill="#22c55e"/>
    <circle cx="90" cy="58" r="3" fill="#1f2937"/>
  </g>

  <!-- Battery to buck converter -->
  <path d="M 30 253 L 15 253 L 15 347 L 30 347" stroke="#ef4444" stroke-width="2" fill="none"/>
  <path d="M 30 271 L 10 271 L 10 358 L 30 358" stroke="#1f2937" stroke-width="2" fill="none"/>

  <!-- Modified DollaTek Module -->
  <g transform="translate(155, 130)">
    <rect x="0" y="0" width="200" height="240" rx="8" fill="#ecfdf5" stroke="#22c55e" stroke-width="2"/>
    <text x="100" y="22" text-anchor="middle" font-size="11" font-weight="bold" fill="#166534" font-family="Arial, sans-serif">Modified DollaTek</text>
    <text x="100" y="38" text-anchor="middle" font-size="9" fill="#166534" font-family="Arial, sans-serif">Relay removed, 10k pullup added</text>

    <!-- 5V Power input -->
    <g transform="translate(10, 55)">
      <rect x="0" y="0" width="80" height="40" rx="4" fill="#d1fae5" stroke="#22c55e" stroke-width="1"/>
      <text x="40" y="14" text-anchor="middle" font-size="8" font-weight="bold" fill="#166534" font-family="Arial, sans-serif">5V Power In</text>
      <text x="8" y="28" font-size="7" fill="#166534" font-family="Arial, sans-serif">5V+</text>
      <circle cx="0" cy="25" r="3" fill="#22c55e"/>
      <text x="40" y="28" font-size="7" fill="#166534" font-family="Arial, sans-serif">GND</text>
      <circle cx="34" cy="25" r="3" fill="#1f2937"/>
    </g>

    <!-- ESP-01S -->
    <g transform="translate(105, 55)">
      <rect x="0" y="0" width="80" height="40" rx="4" fill="#dbeafe" stroke="#3b82f6" stroke-width="1"/>
      <text x="40" y="14" text-anchor="middle" font-size="8" font-weight="bold" fill="#1e40af" font-family="Arial, sans-serif">ESP-01S</text>
      <text x="40" y="28" text-anchor="middle" font-size="7" fill="#3b82f6" font-family="Arial, sans-serif">WiFi AP 192.168.4.1</text>
    </g>

    <!-- S8050 + pullup (replaces relay) -->
    <g transform="translate(10, 110)">
      <rect x="0" y="0" width="175" height="50" rx="4" fill="#d1fae5" stroke="#22c55e" stroke-width="1"/>
      <text x="87" y="14" text-anchor="middle" font-size="8" font-weight="bold" fill="#166534" font-family="Arial, sans-serif">S8050 Driver + 10k Pullup</text>
      <text x="87" y="28" text-anchor="middle" font-size="7" fill="#15803d" font-family="Arial, sans-serif">Collector: 5V (cam ON) / 0V (cam OFF)</text>
      <text x="87" y="42" text-anchor="middle" font-size="7" fill="#15803d" font-family="Arial, sans-serif">Inverted logic handled in firmware</text>
    </g>

    <!-- Signal output -->
    <g transform="translate(10, 175)">
      <rect x="0" y="0" width="175" height="45" rx="4" fill="#14532d" stroke="#22c55e" stroke-width="2"/>
      <text x="87" y="16" text-anchor="middle" font-size="9" font-weight="bold" fill="#86efac" font-family="Arial, sans-serif">Signal Out (5V / 0V)</text>
      <text x="87" y="32" text-anchor="middle" font-size="8" fill="#4ade80" font-family="Arial, sans-serif">To MOSFET Gate via 100R</text>
      <circle cx="175" cy="20" r="4" fill="#22c55e"/>
    </g>
  </g>

  <!-- Buck converter to DollaTek -->
  <path d="M 120 347 L 140 347 L 140 210 L 155 210" stroke="#22c55e" stroke-width="2" fill="none"/>
  <path d="M 120 358 L 145 358 L 145 222 L 189 222 L 189 210 L 189 210" stroke="#1f2937" stroke-width="2" fill="none"/>

  <!-- MOSFET Board (stripboard) -->
  <g transform="translate(410, 245)">
    <rect x="0" y="0" width="170" height="150" rx="8" fill="#dcfce7" stroke="#22c55e" stroke-width="2"/>
    <text x="85" y="18" text-anchor="middle" font-size="10" font-weight="bold" fill="#166534" font-family="Arial, sans-serif">MOSFET Board</text>
    <text x="85" y="32" text-anchor="middle" font-size="8" fill="#15803d" font-family="Arial, sans-serif">(Stripboard)</text>

    <!-- Components -->
    <g transform="translate(15, 42)">
      <rect x="0" y="0" width="55" height="16" fill="#92400e" rx="3"/>
      <text x="27" y="12" text-anchor="middle" font-size="7" fill="#fef3c7" font-family="Arial, sans-serif">100R</text>
      <text x="62" y="12" font-size="7" fill="#166534" font-family="Arial, sans-serif">Gate R</text>
    </g>
    <g transform="translate(15, 65)">
      <rect x="0" y="0" width="55" height="16" fill="#92400e" rx="3"/>
      <text x="27" y="12" text-anchor="middle" font-size="7" fill="#fef3c7" font-family="Arial, sans-serif">10k</text>
      <text x="62" y="12" font-size="7" fill="#166534" font-family="Arial, sans-serif">Pulldown</text>
    </g>
    <g transform="translate(15, 88)">
      <rect x="0" y="0" width="55" height="22" fill="#1e3a5f" rx="3" stroke="#3b82f6" stroke-width="1"/>
      <text x="27" y="14" text-anchor="middle" font-size="7" fill="#93c5fd" font-weight="bold" font-family="Arial, sans-serif">IRLZ44N</text>
    </g>

    <!-- Pin labels -->
    <text x="80" y="100" font-size="7" fill="#166534" font-family="Arial, sans-serif">G: Gate bus</text>
    <text x="80" y="112" font-size="7" fill="#166534" font-family="Arial, sans-serif">D: Cam GND</text>
    <text x="80" y="124" font-size="7" fill="#166534" font-family="Arial, sans-serif">S: Batt GND</text>

    <!-- Connection points -->
    <circle cx="0" cy="50" r="3" fill="#22c55e"/>
    <text x="-25" y="53" font-size="7" fill="#166534" font-family="Arial, sans-serif">Sig</text>
    <circle cx="170" cy="100" r="4" fill="#f59e0b"/>
    <text x="140" y="140" font-size="7" fill="#166534" font-family="Arial, sans-serif">Cam GND</text>
    <circle cx="0" cy="110" r="3" fill="#1f2937"/>
    <text x="-28" y="113" font-size="7" fill="#166534" font-family="Arial, sans-serif">GND</text>
  </g>

  <!-- Signal wire from DollaTek to MOSFET board -->
  <path d="M 340 325 L 380 325 L 380 295 L 410 295" stroke="#22c55e" stroke-width="2" fill="none"/>

  <!-- Battery GND to MOSFET Source -->
  <path d="M 10 271 L 10 450 L 400 450 L 400 355 L 410 355" stroke="#1f2937" stroke-width="2" fill="none"/>

  <!-- RunCam Split 4 Main Board -->
  <g transform="translate(640, 85)">
    <rect x="0" y="0" width="170" height="240" rx="8" fill="#f0fdf4" stroke="#22c55e" stroke-width="2"/>
    <text x="85" y="22" text-anchor="middle" font-size="11" font-weight="bold" fill="#166534" font-family="Arial, sans-serif">RunCam Split 4</text>
    <text x="85" y="38" text-anchor="middle" font-size="9" fill="#166534" font-family="Arial, sans-serif">Main Board</text>

    <!-- VCC pin -->
    <g transform="translate(10, 55)">
      <rect x="0" y="0" width="65" height="20" fill="#ef4444" rx="3"/>
      <text x="32" y="14" text-anchor="middle" font-size="8" fill="white" font-weight="bold" font-family="Arial, sans-serif">VCC 5-20V</text>
      <circle cx="0" cy="10" r="4" fill="#ef4444"/>
    </g>

    <!-- GND pin -->
    <g transform="translate(10, 85)">
      <rect x="0" y="0" width="65" height="20" fill="#f59e0b" rx="3"/>
      <text x="32" y="14" text-anchor="middle" font-size="8" fill="#1f2937" font-weight="bold" font-family="Arial, sans-serif">GND</text>
      <circle cx="0" cy="10" r="4" fill="#f59e0b"/>
    </g>

    <!-- Video pin -->
    <g transform="translate(10, 115)">
      <rect x="0" y="0" width="65" height="20" fill="#eab308" rx="3" stroke="#ca8a04" stroke-width="1" stroke-dasharray="3,2"/>
      <text x="32" y="14" text-anchor="middle" font-size="8" fill="#1f2937" font-family="Arial, sans-serif">VIDEO</text>
      <text x="80" y="14" font-size="7" fill="#6b7280" font-family="Arial, sans-serif">Config only</text>
    </g>

    <!-- MicroSD -->
    <g transform="translate(90, 55)">
      <rect x="0" y="0" width="60" height="22" fill="#6b7280" rx="3"/>
      <text x="30" y="15" text-anchor="middle" font-size="8" fill="white" font-family="Arial, sans-serif">MicroSD</text>
    </g>

    <!-- Buttons -->
    <circle cx="105" cy="100" r="8" fill="#3b82f6" stroke="#1d4ed8" stroke-width="1"/>
    <text x="105" y="103" text-anchor="middle" font-size="6" fill="white" font-family="Arial, sans-serif">PWR</text>
    <circle cx="135" cy="100" r="8" fill="#8b5cf6" stroke="#6d28d9" stroke-width="1"/>
    <text x="135" y="103" text-anchor="middle" font-size="6" fill="white" font-family="Arial, sans-serif">MODE</text>

    <!-- Status -->
    <text x="85" y="135" text-anchor="middle" font-size="8" fill="#166534" font-family="Arial, sans-serif">Blue LED blink = recording</text>
    <text x="85" y="150" text-anchor="middle" font-size="7" fill="#15803d" font-family="Arial, sans-serif">Auto-record: enable in OSD</text>

    <!-- Ribbon cable to lens -->
    <rect x="55" y="165" width="60" height="10" fill="#d4d4d4" rx="2"/>
    <text x="85" y="173" text-anchor="middle" font-size="6" fill="#525252" font-family="Arial, sans-serif">Ribbon</text>
    <line x1="85" y1="175" x2="85" y2="240" stroke="#9ca3af" stroke-width="6"/>
  </g>

  <!-- Lens Module -->
  <g transform="translate(690, 340)">
    <rect x="0" y="0" width="50" height="50" rx="4" fill="#404040" stroke="#1f2937" stroke-width="2"/>
    <circle cx="25" cy="25" r="15" fill="#1f2937"/>
    <circle cx="25" cy="25" r="10" fill="#3b82f6"/>
    <circle cx="25" cy="25" r="5" fill="#1e3a5f"/>
    <text x="25" y="65" text-anchor="middle" font-size="8" fill="#374151" font-family="Arial, sans-serif">Lens Module</text>
  </g>

  <!-- Battery+ DIRECT to Camera VCC -->
  <path d="M 120 194 L 135 194 L 135 80 L 635 80 L 635 150 L 640 150" stroke="#ef4444" stroke-width="3" fill="none"/>
  <text x="390" y="73" text-anchor="middle" font-size="9" font-weight="bold" fill="#dc2626" font-family="Arial, sans-serif">
    Battery+ DIRECT to Camera VCC (not switched)
  </text>

  <!-- Camera GND through MOSFET (switched path) -->
  <path d="M 640 180 L 610 180 L 610 345 L 580 345" stroke="#f59e0b" stroke-width="3" fill="none"/>
  <text x="615" y="260" font-size="8" fill="#b45309" transform="rotate(-90, 615, 260)" font-family="Arial, sans-serif">Camera GND (switched)</text>

  <!-- Phone/WiFi indicator -->
  <g transform="translate(810, 280)">
    <rect x="0" y="0" width="100" height="130" rx="12" fill="#f1f5f9" stroke="#cbd5e1" stroke-width="2"/>
    <rect x="10" y="10" width="80" height="90" rx="4" fill="#1e293b"/>
    <text x="50" y="30" text-anchor="middle" font-size="8" fill="#60a5fa" font-family="Arial, sans-serif">RocketCam</text>
    <text x="50" y="45" text-anchor="middle" font-size="7" fill="#94a3b8" font-family="Arial, sans-serif">192.168.4.1</text>
    <rect x="15" y="55" width="70" height="35" rx="4" fill="#22c55e"/>
    <text x="50" y="77" text-anchor="middle" font-size="10" fill="white" font-weight="bold" font-family="Arial, sans-serif">ON / OFF</text>
    <circle cx="50" cy="108" r="8" fill="#1e293b"/>
    <text x="50" y="145" text-anchor="middle" font-size="9" fill="#64748b" font-family="Arial, sans-serif">iPhone</text>
  </g>

  <!-- WiFi waves -->
  <path d="M 310 180 Q 320 160 330 180" stroke="#3b82f6" stroke-width="2" fill="none"/>
  <path d="M 305 175 Q 320 145 335 175" stroke="#3b82f6" stroke-width="1.5" fill="none"/>
  <path d="M 300 170 Q 320 130 340 170" stroke="#3b82f6" stroke-width="1" fill="none"/>

  <path d="M 780 340 Q 790 320 800 340" stroke="#3b82f6" stroke-width="2" fill="none"/>
  <path d="M 775 335 Q 790 305 805 335" stroke="#3b82f6" stroke-width="1.5" fill="none"/>

  <!-- Legend -->
  <g transform="translate(30, 490)">
    <rect x="0" y="0" width="890" height="75" rx="6" fill="#f1f5f9" stroke="#cbd5e1" stroke-width="1"/>
    <text x="20" y="18" font-size="11" font-weight="bold" fill="#374151" font-family="Arial, sans-serif">Wiring Legend:</text>

    <line x1="20" y1="35" x2="50" y2="35" stroke="#ef4444" stroke-width="3"/>
    <text x="60" y="39" font-size="9" fill="#374151" font-family="Arial, sans-serif">Red = Power+ (7.4V direct)</text>

    <line x1="230" y1="35" x2="260" y2="35" stroke="#1f2937" stroke-width="3"/>
    <text x="270" y="39" font-size="9" fill="#374151" font-family="Arial, sans-serif">Black = Ground</text>

    <line x1="390" y1="35" x2="420" y2="35" stroke="#22c55e" stroke-width="3"/>
    <text x="430" y="39" font-size="9" fill="#374151" font-family="Arial, sans-serif">Green = 5V / Signal</text>

    <line x1="580" y1="35" x2="610" y2="35" stroke="#f59e0b" stroke-width="3"/>
    <text x="620" y="39" font-size="9" fill="#374151" font-family="Arial, sans-serif">Amber = Camera GND (switched by MOSFET)</text>

    <text x="20" y="58" font-size="9" fill="#22c55e" font-family="Arial, sans-serif">LOW-SIDE SWITCH: MOSFET switches the ground path, not the power rail</text>
    <text x="540" y="58" font-size="9" fill="#22c55e" font-family="Arial, sans-serif">Solid-state / G-force immune / Europe-friendly parts</text>
  </g>
</svg>
