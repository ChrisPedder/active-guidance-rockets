<?xml version="1.0" encoding="UTF-8"?>
<svg viewBox="0 0 900 620" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <defs>
    <pattern id="grid" width="20" height="20" patternUnits="userSpaceOnUse">
      <path d="M 20 0 L 0 0 0 20" fill="none" stroke="#374151" stroke-width="0.5"/>
    </pattern>
  </defs>
  <rect x="0" y="0" width="900" height="620" fill="#1f2937"/>
  <rect x="0" y="0" width="900" height="620" fill="url(#grid)"/>

  <!-- Title -->
  <text x="450" y="30" text-anchor="middle" font-size="16" font-weight="bold" fill="#f9fafb" font-family="Arial, sans-serif">
    DollaTek ESP8266 WiFi Module — MOSFET Modification (Low-Side Switch)
  </text>

  <!-- Battery Section -->
  <g transform="translate(30, 80)">
    <text x="50" y="0" text-anchor="middle" font-size="12" font-weight="bold" fill="#fbbf24" font-family="Arial, sans-serif">POWER SOURCE</text>
    <rect x="10" y="20" width="80" height="100" rx="6" fill="#451a03" stroke="#f59e0b" stroke-width="2"/>
    <text x="50" y="45" text-anchor="middle" font-size="11" font-weight="bold" fill="#fbbf24" font-family="Arial, sans-serif">2S LiPo</text>
    <text x="50" y="62" text-anchor="middle" font-size="10" fill="#fcd34d" font-family="Arial, sans-serif">7.4V</text>
    <text x="50" y="78" text-anchor="middle" font-size="9" fill="#fcd34d" font-family="Arial, sans-serif">500-1000mAh</text>
    <rect x="25" y="90" width="20" height="12" fill="#ef4444" rx="2"/>
    <text x="35" y="99" text-anchor="middle" font-size="8" fill="white" font-weight="bold" font-family="Arial, sans-serif">+</text>
    <rect x="55" y="90" width="20" height="12" fill="#1f2937" rx="2" stroke="#6b7280"/>
    <text x="65" y="99" text-anchor="middle" font-size="8" fill="white" font-weight="bold" font-family="Arial, sans-serif">-</text>
    <circle cx="35" cy="120" r="4" fill="#ef4444"/>
    <circle cx="65" cy="120" r="4" fill="#374151" stroke="#9ca3af" stroke-width="1"/>
  </g>

  <!-- Buck Converter -->
  <g transform="translate(30, 250)">
    <rect x="0" y="0" width="100" height="80" rx="6" fill="#1e3a5f" stroke="#3b82f6" stroke-width="2"/>
    <text x="50" y="20" text-anchor="middle" font-size="10" font-weight="bold" fill="#93c5fd" font-family="Arial, sans-serif">Buck Converter</text>
    <text x="50" y="35" text-anchor="middle" font-size="9" fill="#93c5fd" font-family="Arial, sans-serif">7.4V to 5V</text>
    <text x="10" y="55" font-size="8" fill="#60a5fa" font-family="Arial, sans-serif">IN+</text>
    <circle cx="0" cy="52" r="3" fill="#ef4444"/>
    <text x="10" y="70" font-size="8" fill="#60a5fa" font-family="Arial, sans-serif">IN-</text>
    <circle cx="0" cy="67" r="3" fill="#374151" stroke="#9ca3af" stroke-width="1"/>
    <text x="70" y="55" font-size="8" fill="#60a5fa" font-family="Arial, sans-serif">OUT+</text>
    <circle cx="100" cy="52" r="3" fill="#22c55e"/>
    <text x="70" y="70" font-size="8" fill="#60a5fa" font-family="Arial, sans-serif">OUT-</text>
    <circle cx="100" cy="67" r="3" fill="#374151" stroke="#9ca3af" stroke-width="1"/>
    <text x="50" y="95" text-anchor="middle" font-size="8" fill="#6b7280" font-family="Arial, sans-serif">LM2596 / MP1584</text>
  </g>

  <!-- Wires from battery to buck converter -->
  <path d="M 65 200 L 65 240 L 15 240 L 15 302" stroke="#ef4444" stroke-width="2" fill="none"/>
  <path d="M 95 200 L 95 230 L 25 230 L 25 317" stroke="#6b7280" stroke-width="2" fill="none"/>

  <!-- DollaTek Module -->
  <g transform="translate(180, 100)">
    <rect x="0" y="0" width="280" height="250" rx="8" fill="#1e293b" stroke="#475569" stroke-width="2"/>
    <text x="140" y="25" text-anchor="middle" font-size="14" font-weight="bold" fill="#f1f5f9" font-family="Arial, sans-serif">DollaTek ESP8266 WiFi Module</text>
    <text x="140" y="42" text-anchor="middle" font-size="10" fill="#94a3b8" font-family="Arial, sans-serif">(Modified — relay removed)</text>

    <!-- Power Input -->
    <g transform="translate(15, 55)">
      <rect x="0" y="0" width="80" height="50" rx="4" fill="#374151" stroke="#4b5563" stroke-width="1"/>
      <text x="40" y="15" text-anchor="middle" font-size="9" font-weight="bold" fill="#d1d5db" font-family="Arial, sans-serif">Power In</text>
      <text x="10" y="32" font-size="8" fill="#9ca3af" font-family="Arial, sans-serif">IN+</text>
      <rect x="28" y="24" width="20" height="10" fill="#22c55e" rx="2"/>
      <text x="10" y="45" font-size="8" fill="#9ca3af" font-family="Arial, sans-serif">IN-</text>
      <rect x="28" y="37" width="20" height="10" fill="#374151" rx="2" stroke="#6b7280"/>
      <circle cx="0" cy="29" r="3" fill="#22c55e"/>
      <circle cx="0" cy="42" r="3" fill="#374151" stroke="#9ca3af" stroke-width="1"/>
    </g>

    <!-- ESP8266 -->
    <g transform="translate(110, 55)">
      <rect x="0" y="0" width="70" height="50" rx="4" fill="#1e40af" stroke="#3b82f6" stroke-width="1"/>
      <text x="35" y="15" text-anchor="middle" font-size="9" font-weight="bold" fill="#bfdbfe" font-family="Arial, sans-serif">ESP-01S</text>
      <text x="35" y="28" text-anchor="middle" font-size="8" fill="#93c5fd" font-family="Arial, sans-serif">ESP8266</text>
      <text x="35" y="42" text-anchor="middle" font-size="7" fill="#60a5fa" font-family="Arial, sans-serif">WiFi AP Mode</text>
    </g>

    <!-- Original Relay — removed -->
    <g transform="translate(15, 120)">
      <rect x="0" y="0" width="100" height="55" rx="4" fill="#450a0a" stroke="#dc2626" stroke-width="2" stroke-dasharray="4,2"/>
      <text x="50" y="15" text-anchor="middle" font-size="9" font-weight="bold" fill="#fca5a5" font-family="Arial, sans-serif">RELAY REMOVED</text>
      <text x="50" y="30" text-anchor="middle" font-size="8" fill="#f87171" font-family="Arial, sans-serif">Songle SRD-05VDC</text>
      <text x="50" y="45" text-anchor="middle" font-size="7" fill="#ef4444" font-family="Arial, sans-serif">10G contact bounce!</text>
      <line x1="5" y1="5" x2="95" y2="50" stroke="#dc2626" stroke-width="2"/>
      <line x1="95" y1="5" x2="5" y2="50" stroke="#dc2626" stroke-width="2"/>
    </g>

    <!-- S8050 Driver + 10k pullup -->
    <g transform="translate(130, 120)">
      <rect x="0" y="0" width="135" height="55" rx="4" fill="#374151" stroke="#4b5563" stroke-width="1"/>
      <text x="67" y="14" text-anchor="middle" font-size="8" font-weight="bold" fill="#d1d5db" font-family="Arial, sans-serif">S8050 Driver (kept)</text>
      <text x="67" y="28" text-anchor="middle" font-size="7" fill="#9ca3af" font-family="Arial, sans-serif">+ 10k pullup to 5V</text>
      <text x="67" y="42" text-anchor="middle" font-size="8" fill="#22c55e" font-family="Arial, sans-serif">Collector = Signal Out</text>
      <circle cx="135" cy="35" r="4" fill="#22c55e"/>
    </g>

    <!-- Signal output label -->
    <g transform="translate(15, 195)">
      <rect x="0" y="0" width="250" height="40" rx="4" fill="#14532d" stroke="#22c55e" stroke-width="2"/>
      <text x="125" y="15" text-anchor="middle" font-size="9" font-weight="bold" fill="#86efac" font-family="Arial, sans-serif">SIGNAL OUTPUT (to MOSFET Gate)</text>
      <text x="125" y="30" text-anchor="middle" font-size="8" fill="#4ade80" font-family="Arial, sans-serif">5V when ON (S8050 off) / 0V when OFF (S8050 on)</text>
    </g>
  </g>

  <!-- Wire from buck to dollatek -->
  <path d="M 130 302 L 155 302 L 155 184 L 180 184" stroke="#22c55e" stroke-width="2" fill="none"/>
  <path d="M 130 317 L 165 317 L 165 197 L 180 197" stroke="#6b7280" stroke-width="2" fill="none"/>

  <!-- MOSFET Switch Board -->
  <g transform="translate(520, 100)">
    <rect x="0" y="0" width="200" height="280" rx="8" fill="#052e16" stroke="#22c55e" stroke-width="3"/>
    <text x="100" y="22" text-anchor="middle" font-size="14" font-weight="bold" fill="#86efac" font-family="Arial, sans-serif">MOSFET Switch Board</text>
    <text x="100" y="38" text-anchor="middle" font-size="10" fill="#4ade80" font-family="Arial, sans-serif">(Stripboard)</text>
    <text x="100" y="52" text-anchor="middle" font-size="9" fill="#22c55e" font-family="Arial, sans-serif">LOW-SIDE SWITCH</text>

    <!-- Gate resistor -->
    <g transform="translate(20, 68)">
      <text x="0" y="0" font-size="9" font-weight="bold" fill="#86efac" font-family="Arial, sans-serif">Gate Resistor</text>
      <rect x="0" y="10" width="60" height="18" fill="#92400e" rx="3"/>
      <text x="30" y="23" text-anchor="middle" font-size="9" fill="#fef3c7" font-family="Arial, sans-serif">100R</text>
      <circle cx="0" cy="19" r="3" fill="#22c55e"/>
      <text x="70" y="23" font-size="7" fill="#6b7280" font-family="Arial, sans-serif">Limits gate inrush</text>
    </g>

    <!-- Pull-down resistor -->
    <g transform="translate(20, 108)">
      <text x="0" y="0" font-size="9" font-weight="bold" fill="#86efac" font-family="Arial, sans-serif">Pull-Down</text>
      <rect x="0" y="10" width="60" height="18" fill="#92400e" rx="3"/>
      <text x="30" y="23" text-anchor="middle" font-size="9" fill="#fef3c7" font-family="Arial, sans-serif">10k</text>
      <text x="70" y="16" font-size="7" fill="#6b7280" font-family="Arial, sans-serif">Gate to Source</text>
      <text x="70" y="26" font-size="7" fill="#6b7280" font-family="Arial, sans-serif">(ensures OFF at boot)</text>
    </g>

    <!-- MOSFET Symbol -->
    <g transform="translate(50, 155)">
      <text x="50" y="0" text-anchor="middle" font-size="10" font-weight="bold" fill="#86efac" font-family="Arial, sans-serif">N-Channel MOSFET</text>
      <rect x="30" y="15" width="40" height="60" fill="#1e3a5f" stroke="#3b82f6" stroke-width="2" rx="4"/>
      <!-- Gate -->
      <line x1="0" y1="45" x2="30" y2="45" stroke="#22c55e" stroke-width="2"/>
      <text x="8" y="38" font-size="8" fill="#86efac" font-family="Arial, sans-serif">G</text>
      <circle cx="0" cy="45" r="3" fill="#22c55e"/>
      <!-- Drain -->
      <line x1="50" y1="15" x2="50" y2="0" stroke="#f59e0b" stroke-width="2"/>
      <text x="58" y="10" font-size="8" fill="#fcd34d" font-family="Arial, sans-serif">D</text>
      <circle cx="50" cy="0" r="3" fill="#f59e0b"/>
      <!-- Source -->
      <line x1="50" y1="75" x2="50" y2="90" stroke="#6b7280" stroke-width="2"/>
      <text x="58" y="85" font-size="8" fill="#9ca3af" font-family="Arial, sans-serif">S</text>
      <circle cx="50" cy="90" r="3" fill="#374151" stroke="#9ca3af" stroke-width="1"/>
      <!-- Label -->
      <text x="50" y="50" text-anchor="middle" font-size="8" font-weight="bold" fill="#93c5fd" font-family="Arial, sans-serif">IRLZ44N</text>
    </g>

    <!-- Connection labels -->
    <text x="100" y="262" text-anchor="middle" font-size="8" fill="#4ade80" font-family="Arial, sans-serif">Drain = Camera GND path</text>
    <text x="100" y="274" text-anchor="middle" font-size="8" fill="#4ade80" font-family="Arial, sans-serif">Source = Battery GND</text>
  </g>

  <!-- Signal wire from DollaTek to MOSFET gate resistor -->
  <path d="M 460 255 L 490 255 L 490 187 L 520 187" stroke="#22c55e" stroke-width="2" fill="none"/>
  <text x="490" y="180" font-size="7" fill="#22c55e" font-family="Arial, sans-serif">Signal</text>

  <!-- Camera -->
  <g transform="translate(760, 100)">
    <rect x="0" y="0" width="120" height="120" rx="8" fill="#1e293b" stroke="#3b82f6" stroke-width="2"/>
    <text x="60" y="20" text-anchor="middle" font-size="11" font-weight="bold" fill="#93c5fd" font-family="Arial, sans-serif">RunCam</text>
    <text x="60" y="35" text-anchor="middle" font-size="10" fill="#60a5fa" font-family="Arial, sans-serif">Split 4</text>
    <!-- VCC -->
    <rect x="15" y="50" width="90" height="22" fill="#ef4444" rx="4"/>
    <text x="60" y="65" text-anchor="middle" font-size="9" fill="white" font-weight="bold" font-family="Arial, sans-serif">VCC (Red)</text>
    <circle cx="0" cy="61" r="4" fill="#ef4444"/>
    <!-- GND -->
    <rect x="15" y="80" width="90" height="22" fill="#f59e0b" rx="4"/>
    <text x="60" y="95" text-anchor="middle" font-size="9" fill="#1f2937" font-weight="bold" font-family="Arial, sans-serif">GND (Black)</text>
    <circle cx="0" cy="91" r="4" fill="#f59e0b"/>
    <text x="60" y="115" text-anchor="middle" font-size="7" fill="#6b7280" font-family="Arial, sans-serif">~450mA recording</text>
  </g>

  <!-- Battery+ direct to Camera VCC (NOT through MOSFET) -->
  <path d="M 65 200 L 65 70 L 740 70 L 740 161 L 760 161" stroke="#ef4444" stroke-width="2.5" fill="none"/>
  <text x="400" y="63" text-anchor="middle" font-size="9" font-weight="bold" fill="#ef4444" font-family="Arial, sans-serif">
    Battery+ DIRECT to Camera VCC (always connected, not switched)
  </text>

  <!-- Camera GND through MOSFET Drain -->
  <path d="M 760 191 L 740 191 L 740 255 L 620 255" stroke="#f59e0b" stroke-width="2.5" fill="none"/>
  <text x="690" y="230" font-size="8" fill="#fcd34d" font-family="Arial, sans-serif">Camera GND</text>
  <text x="690" y="242" font-size="7" fill="#fcd34d" font-family="Arial, sans-serif">(switched path)</text>

  <!-- MOSFET Drain connection (from MOSFET symbol to edge) -->
  <circle cx="620" cy="255" r="4" fill="#f59e0b"/>

  <!-- MOSFET Source to common GND -->
  <path d="M 620 345 L 620 420" stroke="#6b7280" stroke-width="2" fill="none"/>

  <!-- Common Ground Bus -->
  <path d="M 95 200 L 95 420 L 620 420" stroke="#6b7280" stroke-width="2" fill="none"/>

  <!-- Ground symbol -->
  <g transform="translate(340, 420)">
    <line x1="0" y1="0" x2="0" y2="10" stroke="#6b7280" stroke-width="2"/>
    <line x1="-15" y1="10" x2="15" y2="10" stroke="#6b7280" stroke-width="3"/>
    <line x1="-10" y1="16" x2="10" y2="16" stroke="#6b7280" stroke-width="2"/>
    <line x1="-5" y1="22" x2="5" y2="22" stroke="#6b7280" stroke-width="1"/>
    <text x="0" y="38" text-anchor="middle" font-size="9" fill="#9ca3af" font-family="Arial, sans-serif">Common GND</text>
  </g>

  <!-- Junction dot on GND bus -->
  <circle cx="340" cy="420" r="4" fill="#6b7280"/>

  <!-- Legend -->
  <g transform="translate(30, 470)">
    <text x="0" y="0" font-size="11" font-weight="bold" fill="#f1f5f9" font-family="Arial, sans-serif">Wire Color Legend:</text>
    <line x1="0" y1="18" x2="30" y2="18" stroke="#ef4444" stroke-width="3"/>
    <text x="40" y="22" font-size="9" fill="#fca5a5" font-family="Arial, sans-serif">Battery+ direct to Camera VCC (always on)</text>
    <line x1="320" y1="18" x2="350" y2="18" stroke="#22c55e" stroke-width="3"/>
    <text x="360" y="22" font-size="9" fill="#86efac" font-family="Arial, sans-serif">5V Signal / Regulated power</text>
    <line x1="580" y1="18" x2="610" y2="18" stroke="#f59e0b" stroke-width="3"/>
    <text x="620" y="22" font-size="9" fill="#fcd34d" font-family="Arial, sans-serif">Camera GND (switched by MOSFET)</text>
    <line x1="0" y1="38" x2="30" y2="38" stroke="#6b7280" stroke-width="3"/>
    <text x="40" y="42" font-size="9" fill="#9ca3af" font-family="Arial, sans-serif">Ground (common)</text>
  </g>

  <!-- Key Points -->
  <g transform="translate(30, 530)">
    <rect x="0" y="0" width="840" height="70" rx="6" fill="#0f172a" stroke="#334155" stroke-width="1"/>
    <text x="420" y="18" text-anchor="middle" font-size="10" font-weight="bold" fill="#fbbf24" font-family="Arial, sans-serif">LOW-SIDE SWITCH — Key Points</text>
    <text x="20" y="36" font-size="8" fill="#fcd34d" font-family="Arial, sans-serif">1. MOSFET switches the GROUND path (Camera GND through Drain to Source to Battery GND)</text>
    <text x="20" y="50" font-size="8" fill="#fcd34d" font-family="Arial, sans-serif">2. Camera VCC connects DIRECTLY to Battery+ (not switched) — MOSFET controls whether the circuit is complete</text>
    <text x="20" y="64" font-size="8" fill="#fcd34d" font-family="Arial, sans-serif">3. Gate at GND (0V) = 5V gate drive, well above 1-2V threshold — IRLZ44N fully saturates — Rds(on) ~25 milliohm</text>
  </g>
</svg>
